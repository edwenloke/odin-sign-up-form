<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Sign Up Form</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="leftBox">
        <div class="logoBox">
            <img class="logoImg" src="./imgs/odin-lined.png" alt="Odin Logo">
            <h1>ODIN</h1>
        </div>

        <p>Photo by <span class="underline">Halie West</span> on <span class="underline">Unsplash</span></p>
    </div>

    <div class="rightBox">
        <div class="introBox">
            <p>
                This is not a real online service! You know you need something like this in your life to help
                you realize your deepest dreams. Sign up now to get started.
            </p>
        </div>

        <div class="signUpBox">
            <p>Let's do this!</p>

            <div class="labelBox">
                <div class="firstNameBox">
                    <label for="firstName">FIRST NAME</label>
                    <input type="text" name="firstName" id="firstName">
                </div>
                <div class="lastNameBox">
                    <label for="lastName">LAST NAME</label>
                    <input type="text" name="lastName" id="lastName">
                </div>
                <div class="emailBox">
                    <label for="email">EMAIL</label>
                    <input type="email" name="email" id="email">
                </div>
                <div class="phoneNumberBox">
                    <label for="phoneNumber">PHONE NUMBER</label>
                    <input type="text" name="phoneNumber" id="phoneNumber">
                </div>
                <div class="passwordBox">
                    <label for="password">PASSWORD</label>
                    <input type="password" name="password" id="password">
                </div>
                <div class="confirmPasswordBox">
                    <label for="confirmPassword">CONFIRM PASSWORD</label>
                    <input type="password" name="confirmPassword" id="confirmPassword">
                </div>
            </div>

            <div class="logInBox">
                <button>Create Account</button>
                <p>Already have an account? Log in</p>
            </div>

        </div>
    </div>
</body>

</html>
