<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Sign Up Form</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="leftBox">
        <div class="logoBox">
            <img class="logoImg" src="./imgs/odin-lined.png" alt="Odin Logo">
            <h1>ODIN</h1>
        </div>

        <p>Photo by <span class="underline">Halie West</span> on <span class="underline">Unsplash</span></p>
    </div>

    <div class="rightBox">
        <section class="introBox">
            <p>
                This is not a real online service! You know you need something like this in your life to help
                you realize your deepest dreams. <br>Sign up <em>now</em> to get started.
            </p>
            <p>You <em>know</em> you want to.</p>
        </section>

        <form>
            <section class="signUpBox">
                <p>Let's do this!</p>
                <div class="labelBox">
                    <div class="firstNameBox">
                        <label for="firstName">FIRST NAME</label>
                        <input type="text" name="firstName" id="firstName">
                    </div>
                    <div class="lastNameBox">
                        <label for="lastName">LAST NAME</label>
                        <input type="text" name="lastName" id="lastName">
                    </div>
                    <div class="emailBox">
                        <label for="email">EMAIL</label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div class="phoneNumberBox">
                        <label for="phoneNumber">PHONE NUMBER</label>
                        <input type="tel" name="phoneNumber" id="phoneNumber">
                    </div>
                    <div class="passwordBox">
                        <label for="password">PASSWORD</label>
                        <input type="password" required name="password" id="password">
                    </div>
                    <div class="confirmPasswordBox">
                        <label for="confirmPassword">CONFIRM PASSWORD</label>
                        <input type="password" required name="confirmPassword" id="confirmPassword">
                    </div>
                </div>
            </section>
            <section class="accBox">
                <button type="submit">Create Account</button>
                <p>Already have an account? <span class="underline">Log in</span></p>
            </section>
        </form>
    </div>
</body>

</html>
